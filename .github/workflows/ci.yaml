name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Test
        run: go test ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}

      - name: Generate GitHub App token for config repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: sample-service-config

      - name: Bump image tag in config repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/platform-engineer-lab/sample-service-config.git" /tmp/config
          cd /tmp/config
          git config user.email "ci@platformlab.local"
          git config user.name "CI"
          sed -i "s|^  tag:.*|  tag: ${SHORT_SHA}|" chart/values.yaml
          BRANCH="ci/bump-image-${SHORT_SHA}"
          git checkout -b "${BRANCH}"
          git add chart/values.yaml
          git commit -m "ci: bump sample-service image to ${SHORT_SHA}"
          git push origin "${BRANCH}"
          gh pr create \
            --repo platform-engineer-lab/sample-service-config \
            --base main \
            --head "${BRANCH}" \
            --title "ci: bump sample-service image to ${SHORT_SHA}" \
            --body "Automated image tag bump. Image: \`ghcr.io/platform-engineer-lab/sample-service:${SHORT_SHA}\`"

